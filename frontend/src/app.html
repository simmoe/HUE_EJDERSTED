<!doctype html>
<html lang="da">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black" />
		<meta name="theme-color" content="#000000" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300&display=swap" rel="stylesheet" />
		<!-- Spotify SDK: callback SKAL findes før script indlæses (ellers AnthemError). -->
		<script>
			window.onSpotifyWebPlaybackSDKReady = function () {
				window.__ejderstedSpotifySdkReady = true;
			};
		</script>
		<script src="https://sdk.scdn.co/spotify-player.js"></script>
		<script>
			if (typeof crypto !== 'undefined' && !crypto.randomUUID) {
				crypto.randomUUID = function () {
					return '10000000-1000-4000-8000-100000000000'.replace(/[018]/g, function (c) {
						return (c ^ (crypto.getRandomValues(new Uint8Array(1))[0] & (15 >> (c / 4)))).toString(16);
					});
				};
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			(function () {
				// Vite dev / preview: ingen SW — ellers caches shell og HMR/CSS-opdateringer ses ikke.
				var p = location.port;
				var isViteDev = p === '5173' || p === '24678';
				var isPreview = p === '4173';
				if (!('serviceWorker' in navigator)) return;
				if (isViteDev || isPreview) {
					navigator.serviceWorker.getRegistrations().then(function (rs) {
						rs.forEach(function (r) {
							r.unregister();
						});
					});
					return;
				}
				navigator.serviceWorker.register('/sw.js');
			})();
		</script>
	</body>
</html>
